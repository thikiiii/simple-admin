<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .test1 {
            width: 300px;
            height: 300px;
            background: #4f60fc;
        }
        .test2 {
            width: 300px;
            height: 300px;
            background: #929af0;
        }
    </style>
</head>
<body>
<div class="test1"></div>
<div class="test2"></div>
<button id="but">but</button>
<script>
    const resizeObserver = new ResizeObserver((entries, observer) => {
        console.log(entries)
        console.log(observer)
    })
    const element = document.querySelector('.test1')
    const element2 = document.querySelector('.test2')
    resizeObserver.observe(element)
    resizeObserver.observe(element2)
    const element1 = document.querySelector('#but')
    element1.addEventListener('click', () => {
        element.style.width = '600px'
        element.style.height = '600px'
    })
</script>
</body>
</html>
